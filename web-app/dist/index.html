<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/veebiarendus/ajututvus/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajututvus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', system-ui, sans-serif;
      }

      /* Glassmorphism card */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      /* Aura timer ring */
      .timer-aura {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .timer-aura::before {
        content: '';
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          #f9a8d4,
          #c4b5fd,
          #93c5fd,
          #a5f3fc,
          #93c5fd,
          #c4b5fd,
          #f9a8d4
        );
        opacity: 0.5;
        filter: blur(18px);
        animation: aura-spin 4s linear infinite;
        z-index: 0;
      }
      .timer-aura > * {
        position: relative;
        z-index: 1;
      }

      /* Warm aura when time is low */
      .timer-aura-warm::before {
        background: conic-gradient(
          from 0deg,
          #fdba74,
          #fb923c,
          #f97316,
          #fdba74,
          #fbbf24,
          #fb923c,
          #fdba74
        );
        opacity: 0.6;
        animation: aura-spin 2s linear infinite;
      }

      @keyframes aura-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes aura-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in {
        animation: fade-in 0.4s ease-out;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      .float {
        animation: float 3s ease-in-out infinite;
      }

      /* Soft gradient text */
      .text-gradient {
        background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Pastel partner highlight */
      .partner-glow {
        background: linear-gradient(135deg, #dbeafe, #e0e7ff, #ede9fe);
        border: 2px solid #c7d2fe;
      }
    </style>
    <script type="module" crossorigin src="/veebiarendus/ajututvus/assets/index-BHDQB21x.js"></script>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <div id="root"></div>
  </body>
</html>
